# .github/workflows/pages.yml
# Déploiement automatique sur GitHub Pages à chaque push sur main
# → https://[ton-pseudo].github.io/[nom-repo]/

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permet de déclencher manuellement depuis l'UI GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Déploie tout le repo racine (HTML, manifest, sw, icons)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
