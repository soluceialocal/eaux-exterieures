<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>État des Eaux en Extérieur</title>

<!-- ── PWA Meta ──────────────────────────────────────────────── -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ÉtatEaux">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">

<!-- ── Libs ──────────────────────────────────────────────────── -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── RESET + BASE ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f8; --surface:#fff; --border:#e2e6ea;
  --text:#1a2332; --muted:#6b7a8d; --light:#f8fafc;
  --stable:#1a9651; --stable-bg:#e8f5ee; --stable-bd:#a8d5b7;
  --watch:#c47a00;  --watch-bg:#fff4e0;  --watch-bd:#f0c060;
  --alert:#c0392b;  --alert-bg:#fdecea;  --alert-bd:#f1a099;
  --blue:#2563eb;   --blue-bg:#eff6ff;   --blue-bd:#bfdbfe;
  --radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:300}
.topbar-logo{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-.3px;white-space:nowrap}
.topbar-logo span{color:var(--blue)}
.topbar-search{flex:1;max-width:280px;margin-left:8px;position:relative}
.topbar-search input{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;background:var(--light);color:var(--text);outline:none;transition:border-color .15s}
.topbar-search input:focus{border-color:var(--blue);background:#fff}
.topbar-search .ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
.topbar-date{font-size:.78rem;color:var(--muted);white-space:nowrap}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.73rem;font-weight:600}
.pill-stable{background:var(--stable-bg);color:var(--stable)}
.pill-watch{background:var(--watch-bg);color:var(--watch)}
.pill-alert{background:var(--alert-bg);color:var(--alert)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.dot.pulse{animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}

/* ── SECONDARY BAR ──────────────────────────────────────────── */
.secbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:56px;z-index:299}
.filter-btn{background:none;border:none;border-bottom:3px solid transparent;padding:11px 15px;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.filter-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.filter-btn:hover:not(.active){color:var(--text)}
.view-toggle{margin-left:auto;display:flex;gap:2px;background:var(--light);border:1px solid var(--border);border-radius:8px;padding:3px}
.vt-btn{background:none;border:none;padding:5px 12px;border-radius:6px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.vt-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* ── ALERT BANNER ───────────────────────────────────────────── */
.alert-banner{background:var(--alert-bg);border-bottom:1px solid var(--alert-bd);padding:9px 20px;font-size:.8rem;color:var(--alert);display:flex;align-items:center;gap:8px}
.alert-banner strong{font-weight:700}
.alert-banner.hidden{display:none}

/* ── LIST VIEW ──────────────────────────────────────────────── */
.main{max-width:1100px;margin:0 auto;padding:20px}
.section-head{display:flex;align-items:center;gap:8px;margin:20px 0 12px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:4px}

/* ── CARD ────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s;position:relative;overflow:hidden}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.09);transform:translateY(-1px)}
.card.alert-card{border-left:4px solid var(--alert)}
.card.watch-card{border-left:4px solid var(--watch)}
.card.stable-card{border-left:4px solid var(--stable)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px}
.card-name{font-size:.9rem;font-weight:700;color:var(--text);line-height:1.3}
.card-river{font-size:.72rem;color:var(--muted);margin-top:2px}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-left:8px}
.badge-stable{background:var(--stable-bg);color:var(--stable)}
.badge-watch{background:var(--watch-bg);color:var(--watch)}
.badge-alert{background:var(--alert-bg);color:var(--alert)}
.card-signal{font-size:.79rem;color:var(--muted);line-height:1.5;margin-bottom:10px;min-height:34px}
.card-signal .highlight{font-weight:600}
.card-signal .highlight.up{color:var(--alert)}
.card-signal .highlight.warn{color:var(--watch)}
.card-signal .highlight.ok{color:var(--stable)}
.card-spark{margin:6px 0 10px}
.card-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px}
.card-meta{font-size:.7rem;color:var(--muted)}
.card-usage{font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--light);color:var(--muted);border:1px solid var(--border)}

/* ── MAP VIEW ───────────────────────────────────────────────── */
.map-view{display:none;height:calc(100vh - 112px);position:relative}
.map-view.active{display:block}
#map{height:100%;width:100%}
.map-legend{position:absolute;bottom:24px;left:16px;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.75rem;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.map-legend-item{display:flex;align-items:center;gap:7px;padding:2px 0;color:var(--text)}
.map-legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.map-popup-name{font-weight:700;font-size:.88rem;color:var(--text);margin-bottom:3px}
.map-popup-river{font-size:.75rem;color:var(--muted);margin-bottom:6px}
.map-popup-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:.7rem;font-weight:700}
.map-popup-btn{display:block;margin-top:8px;text-align:center;padding:6px 12px;background:var(--blue);color:#fff;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;width:100%}

/* ── EMPTY STATE ─────────────────────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .ico{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.88rem}

/* ── OVERLAY + PANEL ────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(500px,100vw);background:var(--surface);z-index:501;overflow:hidden;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.panel.open{transform:translateX(0)}
.panel-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;flex-shrink:0}
.panel-close{position:absolute;top:16px;right:16px;background:var(--light);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--muted)}
.panel-close:hover{background:var(--border)}
.panel-title{font-size:1.05rem;font-weight:700;padding-right:40px;line-height:1.3}
.panel-river{font-size:.78rem;color:var(--muted);margin-top:3px}
.panel-status{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.panel-update{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:4px}

/* Panel tabs */
.panel-tabs{display:flex;background:var(--light);border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{flex:1;padding:10px;font-size:.78rem;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s}
.ptab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--surface)}
.panel-body{flex:1;overflow-y:auto;padding:18px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Info blocks */
.info-block{background:var(--light);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:13px}
.info-block-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
.info-line{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:.81rem}
.info-line:last-child{border-bottom:none}
.info-label{color:var(--muted)}
.info-value{font-weight:600}
.info-value.up{color:var(--alert)}
.info-value.warn{color:var(--watch)}
.info-value.ok{color:var(--stable)}
.chart-wrap{background:var(--light);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:13px}
.chart-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
.advice-block{border-radius:10px;padding:13px;margin-bottom:13px;font-size:.81rem;line-height:1.6}
.advice-alert{background:var(--alert-bg);border:1px solid var(--alert-bd)}
.advice-watch{background:var(--watch-bg);border:1px solid var(--watch-bd)}
.advice-stable{background:var(--stable-bg);border:1px solid var(--stable-bd)}
.advice-title{font-weight:700;margin-bottom:5px;font-size:.81rem}
.advice-alert .advice-title{color:var(--alert)}
.advice-watch .advice-title{color:var(--watch)}
.advice-stable .advice-title{color:var(--stable)}

/* History dots */
.history-dots{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.h-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.h-dot.s{background:var(--stable);opacity:.7}
.h-dot.w{background:var(--watch)}
.h-dot.a{background:var(--alert)}
.h-dot.n{background:var(--border)}

/* Param chart grid */
.param-charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.param-chart-cell{background:var(--light);border:1px solid var(--border);border-radius:10px;padding:11px}
.param-chart-label{font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.param-chart-val{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px}
.param-chart-val span{font-size:.72rem;font-weight:400;color:var(--muted);margin-left:4px}

/* Tech section */
.tech-section{background:var(--light);border:1px solid var(--border);border-radius:10px;padding:13px;font-size:.78rem;color:var(--muted);font-family:monospace}
.tech-section .info-block-title{font-family:var(--font-sans,-apple-system)}

/* Responsive */
@media(max-width:600px){
  .main{padding:12px}
  .topbar-date,.topbar-search{display:none}
  .topbar-right .pill:not(:last-child){display:none}
  .param-charts{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ── TOPBAR ────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-logo" style="line-height:1.2;display:flex;flex-direction:column;justify-content:center">
    <div>État des <span>Eaux</span></div>
    <div style="font-size:.6rem;font-weight:500;color:var(--muted);letter-spacing:.3px;text-transform:uppercase">en Extérieur</div>
  </div>
  <div class="topbar-search">
    <span class="ico">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher une station, rivière…" oninput="onSearch(this.value)">
  </div>
  <div class="topbar-date" id="topbarDate"></div>
  <div class="topbar-right">
    <div class="pill pill-alert" id="summAlert"><div class="dot pulse"></div><span id="nAlert">2</span> alerte</div>
    <div class="pill pill-watch" id="summWatch"><div class="dot"></div><span id="nWatch">3</span> vigilance</div>
    <div class="pill pill-stable"><div class="dot"></div><span id="nStable">8</span> stables</div>
  </div>
</div>

<!-- ── SECONDARY BAR ─────────────────────────────────────────── -->
<div class="secbar">
  <button class="filter-btn active" onclick="filterBy('tous',this)">Tous les points</button>
  <button class="filter-btn" onclick="filterBy('baignade',this)">🏊 Baignade</button>
  <button class="filter-btn" onclick="filterBy('peche',this)">🎣 Pêche</button>
  <button class="filter-btn" onclick="filterBy('irrigation',this)">🌾 Irrigation</button>
  <button class="filter-btn" onclick="filterBy('ecologie',this)">🌿 Écologie</button>
  <div class="view-toggle">
    <button class="vt-btn active" id="btnList" onclick="setView('list')">≡ Liste</button>
    <button class="vt-btn" id="btnMap" onclick="setView('map')">⬡ Carte</button>
  </div>
</div>

<!-- ── ALERT BANNER ───────────────────────────────────────────── -->
<div class="alert-banner" id="alertBanner">
  <div class="dot pulse" style="background:var(--alert)"></div>
  <strong>2 alertes actives</strong> — Castelgaillard (pH) · Les Cassagnères (Nitrates)
</div>

<!-- ── LIST VIEW ──────────────────────────────────────────────── -->
<div class="main" id="listView"></div>

<!-- ── MAP VIEW ──────────────────────────────────────────────── -->
<div class="map-view" id="mapView">
  <div id="map"></div>
  <div class="map-legend">
    <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--alert)"></div>Alerte</div>
    <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--watch)"></div>Vigilance</div>
    <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--stable)"></div>Stable</div>
  </div>
</div>

<!-- ── DETAIL PANEL ─────────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title" id="panelTitle"></div>
    <div class="panel-river" id="panelRiver"></div>
    <div class="panel-status" id="panelStatus"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-tabs">
    <button class="ptab active" onclick="switchTab('terrain',this)">Terrain</button>
    <button class="ptab" onclick="switchTab('graphiques',this)">Graphiques</button>
    <button class="ptab" onclick="switchTab('technique',this)">Technique</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DONNÉES MOCK (calées sur sorties MTDC réelles)
// ─────────────────────────────────────────────────────────────────────────────

const STATIONS = [
  // ── ALERTES
  {
    id:'s1', name:'Plage du Lac de Castelgaillard', river:'Lac de Castelgaillard — Garonne (31)',

  // ── VIGILANCE

    datasets:null,
  },
  {
    id:'s4', name:'Station pompage Saint-Nicolas', river:'Dordogne — Bergerac (24)',

    params:[

  // ── STABLES
  {
    id:'s6', name:'Plage de Biscarrosse', river:'Lac de Biscarrosse (40)',

// SYNTHETIC DATA
// ─────────────────────────────────────────────────────────────────────────────

function buildDataset(type, n) {
  const dates = Array.from({length:n}, (_,i) => {
    const d = new Date(2024,3,1); d.setDate(d.getDate()+i);
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  });
  const base=10, noise=0.4, amp=2.5;
  let signal, phis;
  if(type==='stable'){
    signal = dates.map((_,i)=>+(base+amp*Math.sin(2*Math.PI*i/90)+noise*(Math.random()-.5)*2).toFixed(2));
    phis   = signal.map((_,i)=>+(1+.08*Math.sin(2*Math.PI*i/90)+.03*(Math.random()-.5)).toFixed(3));
  } else if(type==='alert'){
    signal = dates.map((_,i)=>{const s=base+amp*Math.sin(2*Math.PI*i/90)+noise*(Math.random()-.5)*2; return i<72?+s.toFixed(2):+(s+((i-72)/18)*4).toFixed(2);});
    phis   = signal.map((_,i)=>{const p=1+.08*Math.sin(2*Math.PI*i/90)+.03*(Math.random()-.5); return i<70?+p.toFixed(3):+(p+(i-70)*0.012).toFixed(3);});
  } else if(type==='alert-nitrate'){
    signal = dates.map((_,i)=>+(18+i*0.22+noise*(Math.random()-.5)*3).toFixed(2));
    phis   = dates.map((_,i)=>+(1+i*0.004+.03*(Math.random()-.5)).toFixed(3));
  } else if(type==='watch'){
    signal = dates.map((_,i)=>{const s=base+amp*Math.sin(2*Math.PI*i/90)+noise*(Math.random()-.5)*2; return i<80?+s.toFixed(2):+(s+(i-80)*0.4).toFixed(2);});
    phis   = signal.map((_,i)=>{const p=1+.08*Math.sin(2*Math.PI*i/90)+.03*(Math.random()-.5); return i<78?+p.toFixed(3):+(p+(i-78)*0.004).toFixed(3);});
  } else if(type==='watch-cond'){
    signal = dates.map((_,i)=>+(500+i*0.8+noise*(Math.random()-.5)*4).toFixed(2));
    phis   = dates.map((_,i)=>+(1+i*0.002+.03*(Math.random()-.5)).toFixed(3));
  } else if(type==='watch-temp'){
    signal = dates.map((_,i)=>+(16+amp*Math.sin(2*Math.PI*i/90)+.3*(Math.random()-.5)*2+(i>76?i*.04:0)).toFixed(2));
    phis   = dates.map((_,i)=>+(1+.08*Math.sin(2*Math.PI*i/90)+.03*(Math.random()-.5)+(i>74?(i-74)*0.005:0)).toFixed(3));
  }
  return {dates, signal, phis};
}

// Assign datasets on init
const TYPES_MAP = {s1:'alert',s2:'alert-nitrate',s3:'watch',s4:'watch-cond',s5:'watch-temp'};
STATIONS.forEach(s => {
  s.datasets = buildDataset(TYPES_MAP[s.id]||'stable', 90);
});

// ─────────────────────────────────────────────────────────────────────────────
// SPARKLINE SVG (inline, no lib)
// ─────────────────────────────────────────────────────────────────────────────

function sparklineSVG(data, color, w=240, h=36) {
  if(!data||!data.length) return '';
  const min = Math.min(...data), max = Math.max(...data);
  const range = max-min || 1;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1))*w;
    const y = h - ((v-min)/range)*(h-4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">
    <polyline fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" points="${pts}"/>
  </svg>`;
}

function getVisible() {
  return STATIONS.filter(s => {
    const matchFilter = currentFilter === 'tous' || s.usage === currentFilter;
    const q = searchQuery.toLowerCase().trim();
    const matchSearch = !q || s.name.toLowerCase().includes(q) || s.river.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

const COLORS = {alert:'#c0392b', watch:'#c47a00', stable:'#1a9651'};

function renderMain() {
  const main = document.getElementById('listView');
  const visible = getVisible();
  const groups = [
    {key:'alert',  label:'Alertes actives', cls:'alert-card'},
    {key:'watch',  label:'Vigilance',        cls:'watch-card'},
    {key:'stable', label:'Stables',          cls:'stable-card'},
  ];

  let html = '';
  if(!visible.length) {
    html = `<div class="empty-state"><div class="ico">💧</div><p>Aucune station ne correspond à votre recherche.</p></div>`;
  } else {
    groups.forEach(g => {
      const filtered = visible.filter(s => s.status === g.key);
      if(!filtered.length) return;
      html += `<div class="section-head">${g.label} (${filtered.length})</div><div class="grid">`;
      filtered.forEach(s => {
        const badgeCls = {alert:'badge-alert',watch:'badge-watch',stable:'badge-stable'}[s.status];
        const badgeTxt = {alert:'Alerte',watch:'Vigilance',stable:'Stable'}[s.status];
        const sparkData = s.datasets ? s.datasets.signal.slice(-30) : [];
        const sparkColor = COLORS[s.status];
        const footMeta = s.status==='stable'
          ? `Stable depuis ${s.jours_stable}j`
          : `Dérive depuis ${s.jours_derive}j`;
        html += `<div class="card ${g.cls}" onclick="openPanel('${s.id}')">
          <div class="card-header">
            <div>
              <div class="card-name">${s.name}</div>
              <div class="card-river">${s.river}</div>
            </div>
            <div class="status-badge ${badgeCls}">
              <div class="dot${s.status==='alert'?' pulse':''}"></div>${badgeTxt}
            </div>
          </div>
          <div class="card-signal">${s.signal}</div>
          <div class="card-spark">${sparklineSVG(sparkData, sparkColor)}</div>
          <div class="card-footer">
            <div class="card-meta">${footMeta}</div>
            <div class="card-usage">${{baignade:'🏊 Baignade',peche:'🎣 Pêche',irrigation:'🌾 Irrigation',ecologie:'🌿 Écologie'}[s.usage]}</div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
  }
  main.innerHTML = html;

  // Update counts
  const vis = getVisible();
  document.getElementById('nAlert').textContent  = vis.filter(s=>s.status==='alert').length;
  document.getElementById('nWatch').textContent   = vis.filter(s=>s.status==='watch').length;
  document.getElementById('nStable').textContent  = vis.filter(s=>s.status==='stable').length;

  // Alert banner
  const hasAlert = STATIONS.some(s=>s.status==='alert');
  document.getElementById('alertBanner').classList.toggle('hidden', !hasAlert);
}

function initMap() {
  if(mapInstance) return;
  mapInstance = L.map('map').setView([44.6, 1.0], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors',
    maxZoom:18
  }).addTo(mapInstance);
  updateMapMarkers();
}

function updateMapMarkers() {
  if(!mapInstance) return;
  Object.values(mapMarkers).forEach(m => mapInstance.removeLayer(m));
  mapMarkers = {};

  const visible = getVisible();
  visible.forEach(s => {
    const color = COLORS[s.status];
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);${s.status==='alert'?'animation:pulse 1.8s infinite':''}"></div>`,
      iconSize:[14,14],
      iconAnchor:[7,7],
    });
    const badgeCls = {alert:'badge-alert',watch:'badge-watch',stable:'badge-stable'}[s.status];
    const badgeTxt = {alert:'Alerte',watch:'Vigilance',stable:'Stable'}[s.status];
    const popup = L.popup({maxWidth:220,closeButton:false}).setContent(`
      <div style="font-family:-apple-system,sans-serif;padding:2px 0">
        <div class="map-popup-name">${s.name}</div>
        <div class="map-popup-river">${s.river}</div>
        <span class="status-badge ${badgeCls}" style="font-size:.68rem"><div class="dot${s.status==='alert'?' pulse':''}"></div>${badgeTxt}</span>
        <button class="map-popup-btn" onclick="openPanel('${s.id}')">Voir le détail →</button>
      </div>`);
    const marker = L.marker(s.coords, {icon}).addTo(mapInstance).bindPopup(popup);
    mapMarkers[s.id] = marker;
  });
}

  currentView = v;
  document.getElementById('listView').style.display  = v==='list' ? '' : 'none';
  document.getElementById('mapView').classList.toggle('active', v==='map');
  document.getElementById('btnList').classList.toggle('active', v==='list');

}

function filterBy(key, btn) {
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));

}

let activePanelStation = null;
let activeTab = 'terrain';

function openPanel(id) {
  const s = STATIONS.find(x=>x.id===id);
  if(!s) return;
  activePanelStation = s;
  activeTab = 'terrain';

  document.getElementById('panelTitle').textContent = s.name;
  document.getElementById('panelRiver').textContent = s.river;

  const badgeCls = {alert:'badge-alert',watch:'badge-watch',stable:'badge-stable'}[s.status];
  const badgeTxt = {alert:'Alerte',watch:'Vigilance',stable:'Stable'}[s.status];
  document.getElementById('panelStatus').innerHTML =
    `<span class="status-badge ${badgeCls}"><div class="dot${s.status==='alert'?' pulse':''}"></div>${badgeTxt}</span>
     <span class="panel-update">🕐 ${s.lastUpdate}</span>`;

  // Reset tabs
  document.querySelectorAll('.ptab').forEach((t,i)=>{
    t.classList.toggle('active', i===0);
  });

  renderPanelTab('terrain', s);

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(activePanelStation) renderPanelTab(tab, activePanelStation);
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.body.style.overflow = '';
  Object.values(chartInstances).forEach(c=>c.destroy());
  chartInstances = {};

// INIT
// ─────────────────────────────────────────────────────────────────────────────

const now = new Date();
document.getElementById('topbarDate').textContent =
  now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ─────────────────────────────────────────────────────────────────────────────
// CHARGEMENT DONNÉES RÉELLES (stations.json généré par generate_stations_json.py)
// Fallback sur les données démo si le fichier n'est pas disponible.
// ─────────────────────────────────────────────────────────────────────────────

async function initApp() {
  try {
    const resp = await fetch('./stations.json');
    if (resp.ok) {
      const data = await resp.json();
      if (data && data.length) {
        STATIONS.length = 0;
        data.forEach(s => STATIONS.push(s));
        // Générer les datasets synthétiques pour les stations sans données sparkline
        STATIONS.forEach(s => {
          if (!s.datasets) {
            s.datasets = buildDataset(TYPES_MAP[s.id] || s.status || 'stable', 90);
          }
        });
        console.log(`[données] ${STATIONS.length} stations réelles chargées depuis stations.json`);
      }
    }
  } catch(e) {
    console.log('[données] stations.json non disponible — données démo affichées');
  }
  renderMain();
}

initApp();

// ── PWA — Service Worker ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[PWA] Service Worker enregistré :', reg.scope);
        // Détection mise à jour disponible
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[PWA] Nouvelle version disponible — rechargez pour mettre à jour.');
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] Service Worker non enregistré :', err));
  });
}

// ── PWA — état offline / online ─────────────────────────────────────────────
function updateOnlineStatus() {
  const banner = document.getElementById('alertBanner');
  if (!navigator.onLine) {
    const msg = document.getElementById('offlineMsg');
    if (!msg) {
      const div = document.createElement('div');
      div.id = 'offlineMsg';
      div.style.cssText = 'background:#fff4e0;border-bottom:1px solid #f0c060;padding:8px 20px;font-size:.78rem;color:#c47a00;display:flex;align-items:center;gap:8px';
      div.innerHTML = '<span>📵</span> <strong>Mode hors-ligne</strong> — données affichées depuis le cache local';
      document.querySelector('.secbar').insertAdjacentElement('afterend', div);
    }
  } else {
    document.getElementById('offlineMsg')?.remove();
  }
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();
</script>
